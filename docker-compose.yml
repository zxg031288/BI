# =============================================
# Temp Mail + OpenAI Auto-Register
# 从 .env 加载配置，无需硬编码密码
# =============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temp-mail-register
    restart: unless-stopped
    # ── 端口映射 ──
    # 5000: 主服务 Web UI
    # 1455: OAuth Callback (固定端口)
    ports:
      - "5000:5000"
      - "1455:1455"
    # ── 环境变量（.env 中的值会自动注入）──
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
      - HOST=0.0.0.0
      - TOKEN_OUTPUT_DIR=/app/tokens
      - CALLBACK_HOST=host.docker.internal
      - CALLBACK_PORT=1455
      # ── 可选：全局 HTTP 代理 ──
      # - HTTP_PROXY=http://your-proxy:7890
    volumes:
      - ./tokens:/app/tokens
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  temp-mail-net:
    driver: bridge
